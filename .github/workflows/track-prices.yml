name: Track flight prices

on:
  schedule:
    # Runs once a day at 06:15 UTC. Edit the cron expression to change timing.
    - cron: "15 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Fetch prices
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/fetch_prices.py

      - name: Commit updated data
        run: |
          git config user.name "flight-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Update price data $(date -u +%Y-%m-%d)"
          git push
